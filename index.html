<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowSpex Mission Control</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --border: #374151;
    --blue: #3b82f6; --blue-dim: #1e40af; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --purple: #8b5cf6; --cyan: #06b6d4; --orange: #f59e0b;
    --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .header h1 span { color: var(--blue); }
  .header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--blue); color: white; }
  .tab:hover:not(.active) { background: var(--surface2); }

  /* Cards */
  .card { background: var(--surface); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .full-width { grid-column: 1 / -1; }

  /* Phase bars */
  .phase-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .phase-label { width: 28px; font-weight: 700; color: var(--dim); font-size: 13px; }
  .phase-bar-bg { flex: 1; height: 22px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
  .phase-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .phase-bar-text { position: absolute; left: 8px; top: 3px; font-size: 11px; color: white; font-weight: 600; }
  .phase-bar-pct { position: absolute; right: 8px; top: 3px; font-size: 11px; color: white; }
  .phase-detail { margin: 0 0 8px 36px; padding: 8px 12px; background: var(--bg); border-radius: 6px; font-size: 12px; }
  .phase-detail .has { color: var(--green); }
  .phase-detail .needs { color: var(--red); }
  .phase-detail .bet-ref { color: var(--blue); margin-top: 4px; }

  /* Bet cards */
  .bet-card { background: var(--surface); border-radius: 12px; padding: 16px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .bet-card:hover { border-color: var(--blue); }
  .bet-card .bet-num { font-size: 20px; font-weight: 800; color: var(--blue); }
  .bet-card .bet-name { font-size: 13px; font-weight: 700; margin: 4px 0; }
  .bet-card .bet-appetite { font-size: 11px; color: var(--dim); }
  .bet-card .tim-flag { margin-top: 8px; font-size: 10px; color: var(--yellow); font-weight: 600; }

  /* Status badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .badge.not_started { background: #6b728022; color: #6b7280; }
  .badge.in_progress { background: #3b82f622; color: #3b82f6; }
  .badge.done { background: #22c55e22; color: #22c55e; }
  .badge.paused { background: #eab30822; color: #eab308; }
  .badge.future { background: #6b728022; color: #6b7280; }
  .badge.upcoming { background: #1e40af44; color: #93c5fd; }

  /* Milestone timeline */
  .milestone { display: flex; gap: 12px; margin-bottom: 16px; }
  .milestone-dot-col { display: flex; flex-direction: column; align-items: center; }
  .milestone-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 2px solid var(--border); color: var(--dim); }
  .milestone-dot.upcoming { border-color: var(--blue); background: var(--blue-dim); color: #93c5fd; }
  .milestone-dot.in_progress { border-color: var(--green); background: #166534; color: #86efac; }
  .milestone-dot.done { border-color: var(--green); background: var(--green); color: white; }
  .milestone-line { width: 2px; flex: 1; background: var(--border); margin-top: 4px; }
  .milestone-content { flex: 1; padding-bottom: 4px; }
  .milestone-name { font-weight: 700; font-size: 14px; }
  .milestone-criteria { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .milestone-revenue { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 4px; }
  .milestone-bets { margin-top: 4px; display: flex; gap: 4px; }
  .milestone-bet-tag { padding: 2px 8px; border-radius: 4px; background: var(--blue-dim); color: #93c5fd; font-size: 11px; font-weight: 600; }

  /* Hill chart SVG */
  .hill-container { margin: 12px 0; }

  /* Bet detail */
  .bet-detail { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; }
  .bet-detail h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .bet-detail h2 span { color: var(--blue); }
  .bet-detail .deliverable { color: var(--muted); font-size: 14px; }
  .bet-detail .appetite-display { text-align: right; }
  .bet-detail .appetite-label { font-size: 12px; color: var(--dim); }
  .bet-detail .appetite-value { font-size: 18px; font-weight: 800; color: var(--orange); }

  .meta-card { background: var(--bg); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .meta-label { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
  .meta-value { font-size: 14px; font-weight: 600; }
  .tim-gate { background: #451a03; border: 1px solid #92400e; border-radius: 8px; padding: 16px; }
  .tim-gate .tim-title { font-size: 12px; color: #fbbf24; font-weight: 700; margin-bottom: 4px; }
  .tim-gate .tim-desc { font-size: 12px; color: #d97706; }

  /* Scope list */
  .scope-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; padding: 6px 8px; border-radius: 6px; transition: background 0.15s; }
  .scope-row:hover { background: var(--bg); }
  .scope-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .scope-name { font-weight: 600; }
  .scope-note { color: var(--dim); margin-left: 8px; }
  .scope-hill-label { font-weight: 700; font-size: 11px; margin-left: auto; white-space: nowrap; }
  .scope-hill-label.uphill { color: var(--orange); }
  .scope-hill-label.downhill { color: var(--green); }
  .scope-hill-label.done { color: var(--green); }

  /* Scope editor */
  .scope-editor { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .scope-slider { width: 80px; accent-color: var(--blue); }
  .scope-done-btn { padding: 2px 8px; border-radius: 4px; border: 1px solid var(--green); background: transparent; color: var(--green); font-size: 10px; font-weight: 700; cursor: pointer; }
  .scope-done-btn:hover { background: var(--green); color: white; }
  .scope-done-btn.is-done { background: var(--green); color: white; }

  /* Status selector */
  .status-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }

  /* Plugin matrix */
  .matrix-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix-table th { text-align: center; padding: 8px 6px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 700; font-size: 11px; }
  .matrix-table th:first-child { text-align: left; padding-left: 12px; }
  .matrix-table td { text-align: center; padding: 8px 6px; border-bottom: 1px solid #1e293b; }
  .matrix-table td:first-child { text-align: left; padding-left: 12px; font-weight: 600; white-space: nowrap; }
  .matrix-cell { width: 20px; height: 20px; border-radius: 4px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
  .matrix-cell.doc { background: #166534; }
  .matrix-cell.track { background: var(--blue-dim); }
  .matrix-cell.empty { background: var(--surface); }
  .gap-row td { border-top: 2px solid var(--border); }
  .gap-pct { font-size: 12px; font-weight: 800; }

  .orchestration-note { margin-top: 20px; background: var(--surface); border-radius: 12px; padding: 20px; }
  .orchestration-note h3 { color: var(--yellow); font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .orchestration-note p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .orchestration-note span { color: var(--blue); font-weight: 600; }

  /* Legend */
  .legend { margin-top: 16px; display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }

  /* Activity log */
  .activity-item { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e293b22; font-size: 12px; }
  .activity-time { color: var(--dim); white-space: nowrap; min-width: 60px; }
  .activity-actor { color: var(--blue); font-weight: 600; min-width: 60px; }
  .activity-text { color: var(--muted); }

  /* Footer */
  .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #1e293b; display: flex; justify-content: space-between; font-size: 12px; color: #475569; }

  /* Saved indicator */
  .save-indicator { position: fixed; top: 16px; right: 16px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .save-indicator.saving { background: var(--blue-dim); color: #93c5fd; opacity: 1; }
  .save-indicator.saved { background: #166534; color: #86efac; opacity: 1; }
  .save-indicator.hidden { opacity: 0; }

  /* Actor picker */
  .actor-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: var(--muted); }
  .actor-btn { padding: 4px 12px; border-radius: 6px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; }
  .actor-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }

  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-5 { grid-template-columns: repeat(2, 1fr); }
    .bet-detail { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="save-indicator" class="save-indicator hidden"></div>

<div class="container" id="app">
  <div class="header">
    <div>
      <h1><span>FlowSpex</span> Mission Control</h1>
      <p>Master Plan Dashboard — Shape Up Bets</p>
    </div>
    <div style="text-align: right">
      <div class="tabs" id="tabs"></div>
      <div class="actor-bar" style="margin-top: 8px;">
        <span>Acting as:</span>
        <button class="actor-btn active" data-actor="Pavel" onclick="setActor('Pavel')">Pavel</button>
        <button class="actor-btn" data-actor="Tim" onclick="setActor('Tim')">Tim</button>
      </div>
    </div>
  </div>
  <div id="content"></div>
  <div class="footer">
    <span>FlowSpex Mission Control — Master Plan v1.0</span>
    <span id="footer-updated"></span>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wxxihhojcwctfrniglxy.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4eGloaG9qY3djdGZybmlnbHh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzI4OTAsImV4cCI6MjA5MDE0ODg5MH0.0zOAB6xdl5h0B000tO7iIjQU1ghpoPeeVGYdWDGGQG4';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const SCOPE_COLORS = ['#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#10b981','#ef4444','#ec4899'];
const STATUS_LABELS = { not_started: 'Not Started', in_progress: 'In Progress', done: 'Done', paused: 'Paused' };
const PLUGINS_STATIC = [
  { name: 'Export Compliance', phases: [1,2] },
  { name: 'DG Compliance', phases: [2,3] },
  { name: 'ATA Carnet', phases: [2,3] },
  { name: 'Shipping Docs', phases: [2,3] },
  { name: 'Invoicer', phases: [0] },
  { name: 'FedEx Shipment', phases: [2,3] },
  { name: 'Order Lifecycle', phases: [0,1,2,3,4,5,6], isTracker: true },
  { name: 'QMS Ops', phases: [6] },
  { name: 'Shipping Transport', phases: [2,3] },
];

let state = { bets: [], scopes: [], phases: [], milestones: [], decisions: [], activity: [] };
let currentView = 'overview';
let selectedBet = null;
let expandedPhase = null;
let currentActor = 'Pavel';

// --- Data loading ---
async function loadAll() {
  const [bets, scopes, phases, milestones, decisions, activity] = await Promise.all([
    sb.from('flowspex_bets').select('*').order('id'),
    sb.from('flowspex_scopes').select('*').order('id'),
    sb.from('flowspex_phases').select('*').order('id'),
    sb.from('flowspex_milestones').select('*').order('id'),
    sb.from('flowspex_decisions').select('*').order('id', { ascending: false }),
    sb.from('flowspex_activity').select('*').order('created_at', { ascending: false }).limit(20),
  ]);
  state.bets = bets.data || [];
  state.scopes = scopes.data || [];
  state.phases = phases.data || [];
  state.milestones = milestones.data || [];
  state.decisions = decisions.data || [];
  state.activity = activity.data || [];
  render();
}

// --- Mutations ---
async function showSaved() {
  const el = document.getElementById('save-indicator');
  el.textContent = 'Saved'; el.className = 'save-indicator saved';
  setTimeout(() => el.className = 'save-indicator hidden', 1500);
}

async function logActivity(action, targetType, targetId, details) {
  await sb.from('flowspex_activity').insert({ actor: currentActor, action, target_type: targetType, target_id: String(targetId), details });
}

async function updateScopeHill(scopeId, newHill) {
  await sb.from('flowspex_scopes').update({ hill_position: newHill }).eq('id', scopeId);
  const scope = state.scopes.find(s => s.id === scopeId);
  if (scope) { scope.hill_position = newHill; render(); }
  await logActivity('moved hill', 'scope', scopeId, { hill_position: newHill });
  showSaved();
}

async function updateScopeStatus(scopeId, newStatus) {
  const updates = { status: newStatus };
  if (newStatus === 'done') updates.hill_position = 100;
  await sb.from('flowspex_scopes').update(updates).eq('id', scopeId);
  const scope = state.scopes.find(s => s.id === scopeId);
  if (scope) { Object.assign(scope, updates); render(); }
  await logActivity('set status ' + newStatus, 'scope', scopeId, {});
  showSaved();
}

async function updateBetStatus(betId, newStatus) {
  const updates = { status: newStatus };
  if (newStatus === 'in_progress' && !state.bets.find(b=>b.id===betId)?.started_at) updates.started_at = new Date().toISOString();
  if (newStatus === 'done') updates.completed_at = new Date().toISOString();
  await sb.from('flowspex_bets').update(updates).eq('id', betId);
  const bet = state.bets.find(b => b.id === betId);
  if (bet) { Object.assign(bet, updates); render(); }
  await logActivity('set bet status ' + newStatus, 'bet', betId, {});
  showSaved();
}

async function updateMilestoneStatus(mId, newStatus) {
  const updates = { status: newStatus };
  if (newStatus === 'done') updates.completed_at = new Date().toISOString();
  await sb.from('flowspex_milestones').update(updates).eq('id', mId);
  const m = state.milestones.find(x => x.id === mId);
  if (m) { Object.assign(m, updates); render(); }
  await logActivity('set milestone status ' + newStatus, 'milestone', mId, {});
  showSaved();
}

// --- Hill chart SVG ---
function hillSVG(scopes, compact) {
  const w = compact ? 260 : 400, h = compact ? 70 : 100;
  function hillY(pct) {
    const t = pct / 100;
    if (t <= 0.5) return h - (h * 0.85) * Math.sin((t / 0.5) * Math.PI / 2);
    return h * 0.15 + (h * 0.85) * (1 - Math.cos(((t - 0.5) / 0.5) * Math.PI / 2));
  }
  const path = `M 0 ${h} Q ${w*0.25} ${h*0.1}, ${w*0.5} ${h*0.15} Q ${w*0.75} ${h*0.1}, ${w} ${h}`;
  let svg = `<svg viewBox="0 0 ${w} ${h+12}" style="width:100%;max-width:${w}px">`;
  svg += `<path d="${path}" fill="none" stroke="#374151" stroke-width="2"/>`;
  svg += `<line x1="${w*0.5}" y1="0" x2="${w*0.5}" y2="${h}" stroke="#374151" stroke-width="1" stroke-dasharray="4 4"/>`;
  if (!compact) {
    svg += `<text x="${w*0.25}" y="${h+11}" text-anchor="middle" fill="#6b7280" font-size="10">Figuring it out</text>`;
    svg += `<text x="${w*0.75}" y="${h+11}" text-anchor="middle" fill="#6b7280" font-size="10">Executing</text>`;
  }
  scopes.forEach((s, i) => {
    const x = (s.hill_position / 100) * w;
    const y = hillY(s.hill_position);
    const c = s.status === 'done' ? '#22c55e' : SCOPE_COLORS[i % SCOPE_COLORS.length];
    const r = compact ? 4 : 6;
    svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="${c}" stroke="white" stroke-width="1.5"><title>${s.name}: ${s.hill_position}%</title></circle>`;
  });
  svg += '</svg>';
  return svg;
}

// --- Rendering ---
function setActor(a) {
  currentActor = a;
  document.querySelectorAll('.actor-btn').forEach(b => b.classList.toggle('active', b.dataset.actor === a));
}

function setView(v) { currentView = v; selectedBet = null; expandedPhase = null; render(); }

function render() {
  // Tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = ['overview','bets','plugins','activity'].map(v =>
    `<button class="tab ${currentView===v?'active':''}" onclick="setView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`
  ).join('');

  document.getElementById('footer-updated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-CH', { year:'numeric', month:'long', day:'numeric' });

  const content = document.getElementById('content');
  if (currentView === 'overview') renderOverview(content);
  else if (currentView === 'bets') renderBets(content);
  else if (currentView === 'plugins') renderPlugins(content);
  else if (currentView === 'activity') renderActivity(content);
}

function renderOverview(el) {
  let html = '<div class="grid-2">';

  // Phase coverage
  html += '<div class="card"><div class="card-title">Phase Coverage</div>';
  state.phases.forEach(p => {
    const color = p.coverage >= 70 ? 'var(--green)' : p.coverage >= 30 ? 'var(--yellow)' : 'var(--red)';
    html += `<div class="phase-row" onclick="expandedPhase=expandedPhase===${p.id}?null:${p.id};render()">
      <div class="phase-label">P${p.id}</div>
      <div class="phase-bar-bg">
        <div class="phase-bar-fill" style="width:${p.coverage}%;background:${color}"></div>
        <span class="phase-bar-text">${p.name}</span>
        <span class="phase-bar-pct">${p.coverage}%</span>
      </div>
    </div>`;
    if (expandedPhase === p.id) {
      html += '<div class="phase-detail">';
      if (p.plugins && p.plugins.length) html += `<div><span class="has">Has:</span> ${p.plugins.join(', ')}</div>`;
      if (p.missing && p.missing.length) html += `<div style="margin-top:4px"><span class="needs">Needs:</span> ${p.missing.join(', ')}</div>`;
      if (p.bet_id) html += `<div class="bet-ref">Addressed in Bet ${p.bet_id}</div>`;
      html += '</div>';
    }
  });
  html += '</div>';

  // Milestones
  html += '<div class="card"><div class="card-title">Milestones & Revenue</div>';
  state.milestones.forEach((m, i) => {
    html += `<div class="milestone">
      <div class="milestone-dot-col">
        <div class="milestone-dot ${m.status}">${m.id}</div>
        ${i < state.milestones.length - 1 ? '<div class="milestone-line"></div>' : ''}
      </div>
      <div class="milestone-content">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="milestone-name">${m.name}</div>
          <select class="status-select" onchange="updateMilestoneStatus('${m.id}',this.value)">
            ${['future','upcoming','in_progress','done'].map(s=>`<option value="${s}" ${m.status===s?'selected':''}>${STATUS_LABELS[s]||s}</option>`).join('')}
          </select>
        </div>
        <div class="milestone-criteria">${m.criteria||''}</div>
        ${m.revenue ? `<div class="milestone-revenue">${m.revenue}</div>` : ''}
        ${m.bet_ids && m.bet_ids.length ? `<div class="milestone-bets">${m.bet_ids.map(b=>`<span class="milestone-bet-tag">Bet ${b}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div></div>';

  // Bet cards
  html += '<div class="grid-5" style="margin-top:20px">';
  state.bets.forEach(bet => {
    const betScopes = state.scopes.filter(s => s.bet_id === bet.id);
    html += `<div class="bet-card" onclick="currentView='bets';selectedBet=${bet.id};render()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="bet-num">#${bet.id}</span>
        <span class="badge ${bet.status}">${STATUS_LABELS[bet.status]||bet.status}</span>
      </div>
      <div class="bet-name">${bet.name}</div>
      <div class="bet-appetite">${bet.appetite}</div>
      ${bet.tim_needed ? '<div class="tim-flag">Needs Tim\'s input</div>' : ''}
      <div class="hill-container">${hillSVG(betScopes, true)}</div>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function renderBets(el) {
  let html = '<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">';
  state.bets.forEach(bet => {
    html += `<button class="tab ${selectedBet===bet.id?'active':''}" onclick="selectedBet=selectedBet===${bet.id}?null:${bet.id};render()">Bet ${bet.id}: ${bet.name}</button>`;
  });
  html += '</div>';

  if (selectedBet) {
    const bet = state.bets.find(b => b.id === selectedBet);
    const betScopes = state.scopes.filter(s => s.bet_id === bet.id);

    html += '<div class="card"><div class="bet-detail">';

    // Left: hill chart + scopes
    html += '<div>';
    html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <h2><span>Bet ${bet.id}:</span> ${bet.name}</h2>
        <p class="deliverable">${bet.deliverable||''}</p>
      </div>
      <div class="appetite-display">
        <div class="appetite-label">Appetite</div>
        <div class="appetite-value">${bet.appetite}</div>
      </div>
    </div>`;

    html += `<div class="card-title">Hill Chart</div>`;
    html += `<div class="hill-container">${hillSVG(betScopes, false)}</div>`;

    html += '<div style="margin-top:16px">';
    betScopes.forEach((s, i) => {
      const c = s.status === 'done' ? '#22c55e' : SCOPE_COLORS[i % SCOPE_COLORS.length];
      const hillLabel = s.status === 'done' ? 'Done' : s.hill_position >= 50 ? 'Downhill' : 'Uphill';
      const hillClass = s.status === 'done' ? 'done' : s.hill_position >= 50 ? 'downhill' : 'uphill';
      html += `<div class="scope-row">
        <div class="scope-dot" style="background:${c}"></div>
        <div>
          <span class="scope-name">${s.name}</span>
          <span class="scope-note">${s.note||''}</span>
        </div>
        <div class="scope-editor">
          <input type="range" class="scope-slider" min="0" max="100" value="${s.hill_position}"
            onchange="updateScopeHill(${s.id},parseInt(this.value))" ${s.status==='done'?'disabled':''}>
          <span class="scope-hill-label ${hillClass}">${s.hill_position}%</span>
          <button class="scope-done-btn ${s.status==='done'?'is-done':''}"
            onclick="updateScopeStatus(${s.id},${s.status==='done'?"'in_progress'":"'done'"})">
            ${s.status==='done'?'Undo':'Done'}
          </button>
        </div>
      </div>`;
    });
    html += '</div></div>';

    // Right: metadata
    html += '<div>';
    html += `<div class="meta-card"><div class="meta-label">Status</div>
      <select class="status-select" onchange="updateBetStatus(${bet.id},this.value)" style="font-size:14px;font-weight:700">
        ${['not_started','in_progress','done','paused'].map(s=>`<option value="${s}" ${bet.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
      </select>
    </div>`;
    html += `<div class="meta-card"><div class="meta-label">Priority</div><div class="meta-value" style="color:var(--blue)">${bet.priority}</div></div>`;
    html += `<div class="meta-card"><div class="meta-label">Depends on</div><div class="meta-value">${bet.depends_on||'Nothing'}</div></div>`;

    if (bet.tim_needed) {
      html += `<div class="tim-gate"><div class="tim-title">Tim's Input Required</div><div class="tim-desc">This bet is gated on Tim documenting operational logic in the Tim Input Worksheet.</div></div>`;
    }

    // Phase coverage for this bet
    const betPhases = state.phases.filter(p => p.bet_id === bet.id);
    if (betPhases.length) {
      html += '<div class="meta-card" style="margin-top:12px"><div class="meta-label" style="margin-bottom:8px">Phases covered</div>';
      betPhases.forEach(p => {
        const color = p.coverage >= 70 ? 'var(--green)' : p.coverage >= 30 ? 'var(--yellow)' : 'var(--red)';
        html += `<div class="phase-row">
          <div class="phase-label">P${p.id}</div>
          <div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${p.coverage}%;background:${color}"></div>
          <span class="phase-bar-text">${p.name}</span><span class="phase-bar-pct">${p.coverage}%</span></div></div>`;
      });
      html += '</div>';
    }

    html += '</div></div></div>';
  } else {
    html += '<div class="card" style="padding:40px;text-align:center;color:var(--dim)">Select a bet above to see its hill chart and details</div>';
  }

  el.innerHTML = html;
}

function renderPlugins(el) {
  let html = '<div class="card-title">Plugin x Phase Matrix</div>';
  html += '<div class="card" style="overflow-x:auto"><table class="matrix-table"><thead><tr><th>Plugin</th>';
  state.phases.forEach(p => { html += `<th>P${p.id}</th>`; });
  html += '</tr></thead><tbody>';

  PLUGINS_STATIC.forEach(plugin => {
    html += `<tr><td>${plugin.name}</td>`;
    state.phases.forEach(p => {
      const has = plugin.phases.includes(p.id);
      if (has) {
        html += `<td><div class="matrix-cell ${plugin.isTracker?'track':'doc'}">${plugin.isTracker?'T':'D'}</div></td>`;
      } else {
        html += '<td><div class="matrix-cell empty"></div></td>';
      }
    });
    html += '</tr>';
  });

  // Gap row
  html += '<tr class="gap-row"><td style="font-weight:700;color:var(--red)">MISSING</td>';
  state.phases.forEach(p => {
    const gap = 100 - p.coverage;
    const color = p.coverage === 0 ? 'var(--red)' : p.coverage < 80 ? 'var(--yellow)' : 'var(--green)';
    html += `<td><span class="gap-pct" style="color:${color}">${gap}%</span></td>`;
  });
  html += '</tr></tbody></table>';

  html += '<div class="legend"><div class="legend-item"><div class="legend-swatch" style="background:#166534">D</div><span>Document generation</span></div>';
  html += '<div class="legend-item"><div class="legend-swatch" style="background:var(--blue-dim)">T</div><span>Tracking only</span></div></div>';
  html += '</div>';

  html += `<div class="orchestration-note"><h3>The Orchestration Gap</h3>
    <p>Plugins work independently. The invoicer doesn't check the screening report. The shipping docs don't validate against the Carnet item list.
    The OC doesn't reference the EUC. Each plugin is correct in isolation, but mission-level consistency — catching the HS code that drifted
    between the CI and the COO — doesn't exist yet. <span>This is what the consistency engine (Bet 1) solves.</span></p></div>`;

  el.innerHTML = html;
}

function renderActivity(el) {
  let html = '<div class="grid-2">';

  // Activity log
  html += '<div class="card"><div class="card-title">Recent Activity</div>';
  if (state.activity.length === 0) {
    html += '<div style="color:var(--dim);font-size:13px;padding:12px 0">No activity yet. Changes to bets, scopes, and milestones will appear here.</div>';
  } else {
    state.activity.forEach(a => {
      const time = new Date(a.created_at).toLocaleString('en-CH', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      html += `<div class="activity-item">
        <span class="activity-time">${time}</span>
        <span class="activity-actor">${a.actor}</span>
        <span class="activity-text">${a.action} on ${a.target_type} #${a.target_id}</span>
      </div>`;
    });
  }
  html += '</div>';

  // Decision log
  html += '<div class="card"><div class="card-title">Decision Log</div>';
  state.decisions.forEach(d => {
    html += `<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #1e293b">
      <div style="font-size:12px;color:var(--dim)">${d.decision_date}</div>
      <div style="font-size:13px;font-weight:600;margin-top:2px">${d.decision}</div>
      ${d.context ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${d.context}</div>` : ''}
    </div>`;
  });
  html += '</div></div>';

  el.innerHTML = html;
}

// --- Init ---
loadAll();
</script>
</body>
</html>
