<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowSpex Mission Control</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b; --border: #374151;
    --blue: #3b82f6; --blue-dim: #1e40af; --green: #22c55e; --yellow: #eab308;
    --red: #ef4444; --purple: #8b5cf6; --cyan: #06b6d4; --orange: #f59e0b;
    --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .header h1 span { color: var(--blue); }
  .header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .tabs { display: flex; gap: 8px; }
  .tab { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: var(--surface); color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--blue); color: white; }
  .tab:hover:not(.active) { background: var(--surface2); }

  /* Cards */
  .card { background: var(--surface); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .full-width { grid-column: 1 / -1; }

  /* Phase bars */
  .phase-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .phase-label { width: 28px; font-weight: 700; color: var(--dim); font-size: 13px; }
  .phase-bar-bg { flex: 1; height: 22px; background: var(--bg); border-radius: 4px; overflow: hidden; position: relative; }
  .phase-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .phase-bar-text { position: absolute; left: 8px; top: 3px; font-size: 11px; color: white; font-weight: 600; }
  .phase-bar-pct { position: absolute; right: 8px; top: 3px; font-size: 11px; color: white; }
  .phase-detail { margin: 0 0 8px 36px; padding: 8px 12px; background: var(--bg); border-radius: 6px; font-size: 12px; }
  .phase-detail .has { color: var(--green); }
  .phase-detail .needs { color: var(--red); }
  .phase-detail .bet-ref { color: var(--blue); margin-top: 4px; }

  /* Bet cards */
  .bet-card { background: var(--surface); border-radius: 12px; padding: 16px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
  .bet-card:hover { border-color: var(--blue); }
  .bet-card .bet-num { font-size: 20px; font-weight: 800; color: var(--blue); }
  .bet-card .bet-name { font-size: 13px; font-weight: 700; margin: 4px 0; }
  .bet-card .bet-appetite { font-size: 11px; color: var(--dim); }
  .bet-card .tim-flag { margin-top: 8px; font-size: 10px; color: var(--yellow); font-weight: 600; }

  /* Status badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .badge.not_started { background: #6b728022; color: #6b7280; }
  .badge.in_progress { background: #3b82f622; color: #3b82f6; }
  .badge.done { background: #22c55e22; color: #22c55e; }
  .badge.paused { background: #eab30822; color: #eab308; }
  .badge.future { background: #6b728022; color: #6b7280; }
  .badge.upcoming { background: #1e40af44; color: #93c5fd; }

  /* Milestone timeline */
  .milestone { display: flex; gap: 12px; margin-bottom: 16px; }
  .milestone-dot-col { display: flex; flex-direction: column; align-items: center; }
  .milestone-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 2px solid var(--border); color: var(--dim); }
  .milestone-dot.upcoming { border-color: var(--blue); background: var(--blue-dim); color: #93c5fd; }
  .milestone-dot.in_progress { border-color: var(--green); background: #166534; color: #86efac; }
  .milestone-dot.done { border-color: var(--green); background: var(--green); color: white; }
  .milestone-line { width: 2px; flex: 1; background: var(--border); margin-top: 4px; }
  .milestone-content { flex: 1; padding-bottom: 4px; }
  .milestone-name { font-weight: 700; font-size: 14px; }
  .milestone-criteria { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .milestone-revenue { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 4px; }
  .milestone-bets { margin-top: 4px; display: flex; gap: 4px; }
  .milestone-bet-tag { padding: 2px 8px; border-radius: 4px; background: var(--blue-dim); color: #93c5fd; font-size: 11px; font-weight: 600; }

  /* Hill chart SVG */
  .hill-container { margin: 12px 0; }

  /* Bet detail */
  .bet-detail { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; }
  .bet-detail h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .bet-detail h2 span { color: var(--blue); }
  .bet-detail .deliverable { color: var(--muted); font-size: 14px; }
  .bet-detail .appetite-display { text-align: right; }
  .bet-detail .appetite-label { font-size: 12px; color: var(--dim); }
  .bet-detail .appetite-value { font-size: 18px; font-weight: 800; color: var(--orange); }

  .meta-card { background: var(--bg); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .meta-label { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
  .meta-value { font-size: 14px; font-weight: 600; }
  .tim-gate { background: #451a03; border: 1px solid #92400e; border-radius: 8px; padding: 16px; }
  .tim-gate .tim-title { font-size: 12px; color: #fbbf24; font-weight: 700; margin-bottom: 4px; }
  .tim-gate .tim-desc { font-size: 12px; color: #d97706; }

  /* Scope list */
  .scope-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; padding: 6px 8px; border-radius: 6px; transition: background 0.15s; }
  .scope-row:hover { background: var(--bg); }
  .scope-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .scope-name { font-weight: 600; }
  .scope-note { color: var(--dim); margin-left: 8px; }
  .scope-hill-label { font-weight: 700; font-size: 11px; margin-left: auto; white-space: nowrap; }
  .scope-hill-label.uphill { color: var(--orange); }
  .scope-hill-label.downhill { color: var(--green); }
  .scope-hill-label.done { color: var(--green); }

  /* Scope editor */
  .scope-editor { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .scope-slider { width: 80px; accent-color: var(--blue); }
  .scope-done-btn { padding: 2px 8px; border-radius: 4px; border: 1px solid var(--green); background: transparent; color: var(--green); font-size: 10px; font-weight: 700; cursor: pointer; }
  .scope-done-btn:hover { background: var(--green); color: white; }
  .scope-done-btn.is-done { background: var(--green); color: white; }

  /* Status selector */
  .status-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }

  /* Plugin matrix */
  .matrix-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .matrix-table th { text-align: center; padding: 8px 6px; border-bottom: 2px solid var(--border); color: var(--muted); font-weight: 700; font-size: 11px; }
  .matrix-table th:first-child { text-align: left; padding-left: 12px; }
  .matrix-table td { text-align: center; padding: 8px 6px; border-bottom: 1px solid #1e293b; }
  .matrix-table td:first-child { text-align: left; padding-left: 12px; font-weight: 600; white-space: nowrap; }
  .matrix-cell { width: 20px; height: 20px; border-radius: 4px; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; }
  .matrix-cell.doc { background: #166534; }
  .matrix-cell.track { background: var(--blue-dim); }
  .matrix-cell.empty { background: var(--surface); }
  .gap-row td { border-top: 2px solid var(--border); }
  .gap-pct { font-size: 12px; font-weight: 800; }

  .orchestration-note { margin-top: 20px; background: var(--surface); border-radius: 12px; padding: 20px; }
  .orchestration-note h3 { color: var(--yellow); font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .orchestration-note p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .orchestration-note span { color: var(--blue); font-weight: 600; }

  /* Legend */
  .legend { margin-top: 16px; display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; }

  /* Activity log */
  .activity-item { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e293b22; font-size: 12px; }
  .activity-time { color: var(--dim); white-space: nowrap; min-width: 60px; }
  .activity-actor { color: var(--blue); font-weight: 600; min-width: 60px; }
  .activity-text { color: var(--muted); }

  /* Footer */
  .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #1e293b; display: flex; justify-content: space-between; font-size: 12px; color: #475569; }

  /* Saved indicator */
  .save-indicator { position: fixed; top: 16px; right: 16px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .save-indicator.saving { background: var(--blue-dim); color: #93c5fd; opacity: 1; }
  .save-indicator.saved { background: #166534; color: #86efac; opacity: 1; }
  .save-indicator.hidden { opacity: 0; }

  /* Task list */
  .scope-expandable { cursor: pointer; }
  .scope-expandable:hover { background: var(--bg); }
  .scope-chevron { font-size: 10px; color: var(--dim); transition: transform 0.15s; width: 16px; text-align: center; flex-shrink: 0; }
  .scope-chevron.open { transform: rotate(90deg); }
  .task-list { margin: 0 0 12px 36px; padding: 0; }
  .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-left: 2px solid var(--border); margin-bottom: 1px; background: var(--bg); font-size: 12px; transition: border-color 0.15s; }
  .task-item:hover { border-left-color: var(--blue); }
  .task-item:first-child { border-radius: 6px 6px 0 0; }
  .task-item:last-child { border-radius: 0 0 6px 6px; }
  .task-checkbox { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; }
  .task-checkbox:hover { border-color: var(--green); }
  .task-checkbox.done { background: var(--green); border-color: var(--green); color: white; }
  .task-checkbox.in_progress { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .task-checkbox.blocked { background: #451a03; border-color: var(--red); color: var(--red); }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-weight: 600; color: var(--text); }
  .task-name.done { text-decoration: line-through; color: var(--dim); }
  .task-desc { color: var(--muted); font-size: 11px; margin-top: 2px; line-height: 1.4; }
  .task-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
  .task-owner { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }
  .task-owner.Pavel { background: var(--blue-dim); color: #93c5fd; }
  .task-owner.Tim { background: #451a03; color: #fbbf24; }
  .task-owner.Both { background: #1e1b4b; color: #a78bfa; }
  .task-status-btn { font-size: 10px; padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; font-weight: 600; }
  .task-status-btn:hover { border-color: var(--blue); color: var(--blue); }
  .task-notes-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; padding: 4px 8px; margin-top: 4px; resize: none; font-family: inherit; }
  .task-notes-input:focus { outline: none; border-color: var(--blue); }
  .scope-progress { display: flex; gap: 3px; margin-left: 8px; }
  .scope-progress-dot { width: 6px; height: 6px; border-radius: 2px; }
  .scope-summary { font-size: 11px; color: var(--dim); margin-left: auto; white-space: nowrap; }
  .add-task-row { display: flex; gap: 8px; padding: 6px 12px; margin: 0 0 12px 36px; }
  .add-task-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 10px; font-family: inherit; }
  .add-task-input:focus { outline: none; border-color: var(--blue); }
  .add-task-btn { padding: 6px 12px; border-radius: 6px; border: none; background: var(--blue); color: white; font-size: 12px; font-weight: 600; cursor: pointer; }
  .add-task-btn:hover { background: #2563eb; }

  /* Actor picker */
  .actor-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: var(--muted); }
  .actor-btn { padding: 4px 12px; border-radius: 6px; border: 2px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; }
  .actor-btn.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .help-btn { margin-left: 8px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
  .help-btn:hover { border-color: var(--blue); color: var(--blue); }

  .hint { font-size: 12px; color: var(--muted); }
  .empty-state { background: var(--surface); border: 1px dashed var(--border); border-radius: 12px; padding: 20px; color: var(--muted); }
  .readonly-banner { margin-bottom: 12px; background: #1e1b4b; border: 1px solid #4338ca; border-radius: 8px; padding: 10px 12px; font-size: 12px; color: #c7d2fe; }
  .pill { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.stale { background: #451a03; color: #fbbf24; }
  .pipeline { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .pipeline-step { background: var(--surface); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 11px; color: var(--muted); }
  .missions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
  .mission-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .mission-card h4 { font-size: 14px; margin-bottom: 6px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
  .skeleton { background: linear-gradient(90deg, #1f2937 25%, #334155 40%, #1f2937 60%); background-size: 300% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
  .skeleton.row { height: 14px; margin: 8px 0; }
  .decision-item { background: var(--bg); border-left: 3px solid var(--yellow); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 12px; }
  .tooltip { cursor: help; color: var(--blue); border-bottom: 1px dotted var(--blue); }
  .modal-backdrop { position: fixed; inset: 0; background: #020617cc; display: flex; align-items: center; justify-content: center; z-index: 80; }
  .modal { width: min(760px, 92vw); max-height: 80vh; overflow: auto; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
  .mytasks-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .mytasks-table th, .mytasks-table td { padding: 8px 6px; border-bottom: 1px solid #1e293b; text-align: left; }
  .mytasks-table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }

  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  @media (max-width: 900px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-5 { grid-template-columns: repeat(2, 1fr); }
    .bet-detail { grid-template-columns: 1fr; }
  }
</style>
</head>

<!-- Auth Gate -->
<div id="auth-gate" style="display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px">
  <div style="background:var(--surface);border-radius:16px;padding:40px;max-width:380px;width:100%;text-align:center">
    <div style="font-size:32px;font-weight:800;margin-bottom:4px"><span style="color:var(--blue)">FlowSpex</span> MC</div>
    <div style="color:var(--muted);font-size:13px;margin-bottom:28px">Mission Control — restricted access</div>
    <input id="auth-pw" type="password" placeholder="Password" autofocus
      style="width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-bottom:12px;transition:border-color 0.2s"
      onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border)'"
      onkeydown="if(event.key==='Enter')authCheck()">
    <button onclick="authCheck()"
      style="width:100%;padding:12px;border-radius:8px;border:none;background:var(--blue);color:white;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s"
      onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">Enter</button>
    <div id="auth-error" style="color:var(--red);font-size:12px;margin-top:12px;display:none">Wrong password</div>
  </div>
</div>
<script>
async function hashPw(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
// sha256('flowspex2026')
const VALID_HASH = '73c91afb558690ac50966365cf36c83e4c628e59deeae3db7ea50c838d77b5f6';
async function authCheck() {
  const pw = document.getElementById('auth-pw').value;
  const h = await hashPw(pw);
  if (h === VALID_HASH) {
    sessionStorage.setItem('fs-mc-auth', '1');
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app-wrapper').style.display = 'block';
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-pw').value = '';
    document.getElementById('auth-pw').focus();
  }
}
if (sessionStorage.getItem('fs-mc-auth') === '1') {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app-wrapper').style.display = 'block';
  });
}
</script>

];

const TABS = [
  { id: 'missions', label: 'Active Missions' },
  { id: 'dev', label: 'Development' },
  { id: 'activity', label: 'Activity' },
  { id: 'metrics', label: 'Metrics' },
];
const CACHE_KEY = 'flowspex-dashboard-cache-v3';
const WRITES_ENABLED = false; // anon key is read-only under RLS

let state = {
  bets: [],
  scopes: [],
  phases: [],
  milestones: [],
  decisions: [],
  activity: [],
  tasks: [],
  missions: [],
  hillSnapshots: [],
  loadedAt: null,
};
let loading = true;
let loadingError = '';
let hydratedFromCache = false;
let helpOpen = false;

function getTabFromUrl() {
  const tab = new URL(window.location.href).searchParams.get('tab');
  return TABS.some(t => t.id === tab) ? tab : 'missions';
}

let currentView = getTabFromUrl();
let selectedBet = null;
let expandedPhase = null;
let expandedScopes = new Set();
let currentActor = 'Pavel';

function persistCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ state, savedAt: Date.now() }));
  } catch (err) {
    console.warn('Failed to cache dashboard state', err);
  }
}

function hydrateFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed?.state) return;
    state = { ...state, ...parsed.state };
    hydratedFromCache = true;
  } catch (err) {
    console.warn('Failed to hydrate cache', err);
  }
}

function isTimMode() {
  return currentActor === 'Tim';
}

function taskVisibleForActor(task) {
  if (!isTimMode()) return true;
  return task.owner === 'Tim' || task.owner === 'Both';
}

function missionVisibleForActor(mission) {
  if (!isTimMode()) return true;
  return mission.owner === 'Tim' || mission.owner === 'Both';
}

function activityVisibleForActor(item) {
  if (!isTimMode()) return true;
  return (item.actor || '').toLowerCase() === 'tim';
}

function getVisibleTasks() {
  return state.tasks.filter(taskVisibleForActor);
}

function getScopesForBet(betId) {
  const scopes = state.scopes.filter(s => s.bet_id === betId);
  if (!isTimMode()) return scopes;
  return scopes.filter(scope => getVisibleTasks().some(t => t.scope_id === scope.id));
}

function deriveBetStatus(scopes) {
  if (!scopes.length) return 'not_started';
  if (scopes.every(s => s.status === 'done')) return 'done';
  if (scopes.some(s => s.status === 'in_progress' || s.status === 'done')) return 'in_progress';
  return 'not_started';
}

function getBetStatus(bet) {
  const scopes = state.scopes.filter(s => s.bet_id === bet.id);
  const derived = deriveBetStatus(scopes);
  return bet.status && bet.status !== 'not_started' ? bet.status : derived;
}

function deriveMilestoneStatus(milestone) {
  const deps = milestone.bet_ids || [];
  if (!deps.length) return milestone.status || 'future';
  const depStatuses = deps.map(id => getBetStatus(state.bets.find(b => b.id === id) || { id }));
  if (depStatuses.every(s => s === 'done')) return 'done';
  if (depStatuses.some(s => s === 'in_progress' || s === 'done')) return 'in_progress';
  return 'not_started';
}

function updateUrlTab(tabId, replace) {
  const url = new URL(window.location.href);
  url.searchParams.set('tab', tabId);
  if (replace) history.replaceState({}, '', url.toString());
  else history.pushState({}, '', url.toString());
}

window.addEventListener('popstate', () => {
  currentView = getTabFromUrl();
  render();
});

async function loadAll() {
  loading = true;
  loadingError = '';
  render();

  const [bets, scopes, phases, milestones, decisions, activity, tasks, missions, hillSnapshots] = await Promise.all([
    sb.from('flowspex_bets').select('*').order('id'),
    sb.from('flowspex_scopes').select('*').order('id'),
    sb.from('flowspex_phases').select('*').order('id'),
    sb.from('flowspex_milestones').select('*').order('id'),
    sb.from('flowspex_decisions').select('*').order('id', { ascending: false }),
    sb.from('flowspex_activity').select('*').order('created_at', { ascending: false }).limit(100),
    sb.from('flowspex_tasks').select('*').order('priority'),
    sb.from('flowspex_missions').select('*').order('updated_at', { ascending: false }),
    sb.from('flowspex_hill_snapshots').select('*').order('created_at', { ascending: false }).limit(800),
  ]);

  const firstError = [bets, scopes, phases, milestones, decisions, activity, tasks, missions, hillSnapshots]
    .map(r => r.error)
    .find(Boolean);
  if (firstError) loadingError = firstError.message || 'Failed loading dashboard data';

  state.bets = bets.data || [];
  state.scopes = scopes.data || [];
  state.phases = phases.data || [];
  state.milestones = milestones.data || [];
  state.decisions = decisions.data || [];
  state.activity = activity.data || [];
  state.tasks = tasks.data || [];
  state.missions = missions.data || [];
  state.hillSnapshots = hillSnapshots.data || [];
  state.loadedAt = new Date().toISOString();

  persistCache();
  hydratedFromCache = false;
  loading = false;
  render();
}

function showIndicator(text, kind) {
  const el = document.getElementById('save-indicator');
  el.textContent = text;
  el.className = `save-indicator ${kind || 'saved'}`;
  setTimeout(() => el.className = 'save-indicator hidden', 1500);
}

function showReadOnlyNotice() {
  showIndicator('Read-only mode', 'saving');
}

async function logActivity(action, targetType, targetId, details) {
  if (!WRITES_ENABLED) return showReadOnlyNotice();
  await sb.from('flowspex_activity').insert({ actor: currentActor, action, target_type: targetType, target_id: String(targetId), details });
}

function setActor(actor) {
  currentActor = actor;
  document.querySelectorAll('.actor-btn').forEach(b => b.classList.toggle('active', b.dataset.actor === actor));
  if (actor === 'Tim') setView('dev');
  else render();
}

function setView(viewId, skipPush) {
  if (!TABS.some(t => t.id === viewId)) return;
  currentView = viewId;
  selectedBet = null;
  expandedPhase = null;
  if (!skipPush) updateUrlTab(viewId);
  render();
}

function toggleHelp() {
  helpOpen = !helpOpen;
  renderHelpModal();
}

function hillSVG(scopes, compact) {
  const w = compact ? 260 : 400, h = compact ? 70 : 100;
  function hillY(pct) {
    const t = pct / 100;
    if (t <= 0.5) return h - (h * 0.85) * Math.sin((t / 0.5) * Math.PI / 2);
    return h * 0.15 + (h * 0.85) * (1 - Math.cos(((t - 0.5) / 0.5) * Math.PI / 2));
  }
  const path = `M 0 ${h} Q ${w*0.25} ${h*0.1}, ${w*0.5} ${h*0.15} Q ${w*0.75} ${h*0.1}, ${w} ${h}`;
  let svg = `<svg viewBox="0 0 ${w} ${h+12}" style="width:100%;max-width:${w}px">`;
  svg += `<path d="${path}" fill="none" stroke="#374151" stroke-width="2"/>`;
  svg += `<line x1="${w*0.5}" y1="0" x2="${w*0.5}" y2="${h}" stroke="#374151" stroke-width="1" stroke-dasharray="4 4"/>`;
  if (!compact) {
    svg += `<text x="${w*0.25}" y="${h+11}" text-anchor="middle" fill="#6b7280" font-size="10">Figuring it out</text>`;
    svg += `<text x="${w*0.75}" y="${h+11}" text-anchor="middle" fill="#6b7280" font-size="10">Executing</text>`;
  }
  scopes.forEach((s, i) => {
    const x = (Number(s.hill_position || 0) / 100) * w;
    const y = hillY(Number(s.hill_position || 0));
    const c = s.status === 'done' ? '#22c55e' : SCOPE_COLORS[i % SCOPE_COLORS.length];
    const r = compact ? 4 : 6;
    const audited = (s.__allReset === true) ? '#9ca3af' : c;
    svg += `<circle cx="${x}" cy="${y}" r="${r}" fill="${audited}" stroke="white" stroke-width="1.5"><title>${s.name}: ${s.hill_position || 0}%</title></circle>`;
  });
  svg += '</svg>';
  return svg;
}

function markScopeAuditState(scope) {
  const tasks = state.tasks.filter(t => t.scope_id === scope.id);
  if (!tasks.length) return { ...scope, __allReset: false };
  const allReset = tasks.every(t => String(t.notes || '').trim().toUpperCase().startsWith('RESET'));
  return { ...scope, __allReset: allReset };
}

function renderLoadingSkeleton() {
  return `<div class="card"><div class="skeleton row"></div><div class="skeleton row"></div><div class="skeleton row"></div><div class="skeleton row"></div></div>`;
}

function render() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(t => `<button class="tab ${currentView===t.id?'active':''}" onclick="setView('${t.id}')">${t.label}</button>`).join('');

  const loaded = state.loadedAt ? new Date(state.loadedAt) : null;
  const loadedText = loaded ? loaded.toLocaleDateString('en-CH', { year:'numeric', month:'long', day:'numeric' }) : '—';
  const staleBadge = hydratedFromCache ? ' <span class="pill stale">showing cached data</span>' : '';
  document.getElementById('footer-updated').innerHTML = `Last updated: ${loadedText}${staleBadge}`;

  const content = document.getElementById('content');
  if (loading && !state.bets.length && !state.missions.length) {
    content.innerHTML = renderLoadingSkeleton();
    renderHelpModal();
    return;
  }

  if (currentView === 'missions') renderMissions(content);
  else if (currentView === 'dev') renderDevelopment(content);
  else if (currentView === 'activity') renderActivity(content);
  else if (currentView === 'metrics') renderMetrics(content);

  renderHelpModal();
}

function renderMissions(el) {
  const missions = state.missions.filter(missionVisibleForActor);
  const pipeline = ['intake', 'in_progress', 'review', 'delivered', 'closed'];
  const counts = Object.fromEntries(pipeline.map(s => [s, missions.filter(m => m.status === s).length]));

  let html = '';
  if (!WRITES_ENABLED) {
    html += '<div class="readonly-banner">Mission editing is disabled in this dashboard (anon read-only mode). Use Cowork sessions for create/update operations.</div>';
  }

  html += '<div class="card" style="margin-bottom:12px">';
  html += '<div class="card-title">Status Pipeline</div>';
  html += `<div class="pipeline">${pipeline.map(s => `<span class="pipeline-step">${s.replace('_',' ')}: <strong>${counts[s] || 0}</strong></span>`).join('')}</div>`;
  html += '<div class="hint">Pipeline: intake → in_progress → review → delivered → closed</div>';
  html += '</div>';

  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div class="card-title" style="margin:0">Client Missions</div>';
  html += '<button class="tab" onclick="showReadOnlyNotice()">Add Mission</button>';
  html += '</div>';

  if (!missions.length) {
    html += '<div class="empty-state">No active missions yet. First paid engagement is the goal.</div>';
    el.innerHTML = html;
    return;
  }

  html += '<div class="missions-grid">';
  missions.forEach(m => {
    const deadline = m.deadline ? new Date(m.deadline).toLocaleDateString('en-CH') : '—';
    const revEstimate = m.revenue_estimate ? `€${Number(m.revenue_estimate).toLocaleString('en-CH')}` : '—';
    html += `<div class="mission-card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
        <h4>${m.client_name || 'Unnamed Client'}</h4>
        <span class="badge ${m.status || 'not_started'}">${STATUS_LABELS[m.status] || m.status || 'Unknown'}</span>
      </div>
      <div class="hint">${m.mission_type || 'Mission'}${m.destination ? ` • ${m.destination}` : ''}</div>
      ${m.description ? `<div style="font-size:12px;color:var(--muted);margin:8px 0">${m.description}</div>` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;margin-top:8px">
        <div><span class="hint">Deadline:</span> ${deadline}</div>
        <div><span class="hint">Owner:</span> ${m.owner || '—'}</div>
        <div><span class="hint">Est. Revenue:</span> ${revEstimate}</div>
        <div><span class="hint">Actual:</span> ${m.revenue_actual ? `€${Number(m.revenue_actual).toLocaleString('en-CH')}` : '—'}</div>
      </div>
      <div style="margin-top:10px">
        <button class="tab" onclick="showReadOnlyNotice()">Edit</button>
      </div>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function renderDevelopment(el) {
  const visibleTasks = getVisibleTasks();
  const bets = [...state.bets].sort((a, b) => a.id - b.id);

  const currentBet = bets.find(b => getBetStatus(b) === 'in_progress') || bets.find(b => getBetStatus(b) !== 'done') || bets[0];
  if (!selectedBet && currentBet) selectedBet = currentBet.id;
  const selected = bets.find(b => b.id === selectedBet) || currentBet;
  const selectedScopes = selected ? getScopesForBet(selected.id).map(markScopeAuditState) : [];

  const futureBets = bets.filter(b => {
    const hasScopes = state.scopes.some(s => s.bet_id === b.id);
    const hasTasks = state.tasks.some(t => state.scopes.some(s => s.id === t.scope_id && s.bet_id === b.id));
    return !hasScopes && !hasTasks;
  });

  let html = '';
  if (!WRITES_ENABLED) {
    html += '<div class="readonly-banner">Development data is shown read-only. Writes are disabled to respect current anon RLS permissions.</div>';
  }

  if (isTimMode()) {
    const myTasks = [...visibleTasks].sort((a, b) => {
      const pa = Number(a.priority || 999);
      const pb = Number(b.priority || 999);
      return pa - pb;
    });

    html += '<div class="card" style="margin-bottom:16px">';
    html += '<div class="card-title">My Tasks (Tim)</div>';
    if (!myTasks.length) {
      html += '<div class="hint">No Tim-owned tasks currently visible.</div>';
    } else {
      html += '<table class="mytasks-table"><thead><tr><th>Priority</th><th>Task</th><th>Status</th><th>Scope</th></tr></thead><tbody>';
      myTasks.forEach(t => {
        const scope = state.scopes.find(s => s.id === t.scope_id);
        html += `<tr>
          <td>${t.priority ?? '—'}</td>
          <td>${t.name}</td>
          <td><span class="badge ${t.status || 'todo'}">${STATUS_LABELS[t.status] || t.status || 'todo'}</span></td>
          <td>${scope ? scope.name : '—'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    }
    html += '</div>';
  }

  html += '<div class="card" style="margin-bottom:16px">';
  html += '<div class="card-title">Current Bet Detail</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">';
  bets.forEach(b => {
    html += `<button class="tab ${selected && selected.id===b.id?'active':''}" onclick="selectedBet=${b.id};render()">Bet ${b.id}: ${b.name}</button>`;
  });
  html += '</div>';

  if (selected) {
    html += `<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
      <div>
        <h2><span>Bet ${selected.id}:</span> ${selected.name}</h2>
        <div class="deliverable">${selected.deliverable || ''}</div>
      </div>
      <div style="text-align:right">
        <div class="hint">Appetite</div>
        <div style="font-size:18px;font-weight:800;color:var(--orange)">${selected.appetite || '—'}</div>
      </div>
    </div>`;

    if (!selectedScopes.length) {
      html += '<div class="empty-state" style="margin-top:12px">No scoped development items yet for this bet.</div>';
    } else {
      html += `<div class="hill-container" style="margin-top:12px">${hillSVG(selectedScopes, false)}</div>`;
      html += '<div style="margin-top:8px">';
      selectedScopes.forEach((s, i) => {
        const scopeTasks = visibleTasks.filter(t => t.scope_id === s.id);
        const doneTasks = scopeTasks.filter(t => t.status === 'done').length;
        const totalTasks = scopeTasks.length;
        const auditedBadge = s.__allReset ? ' <span class="pill" style="background:#374151;color:#cbd5e1">audited reset</span>' : '';
        html += `<div class="scope-row">
          <div class="scope-dot" style="background:${s.__allReset ? '#9ca3af' : SCOPE_COLORS[i % SCOPE_COLORS.length]}"></div>
          <div style="flex:1">
            <span class="scope-name">${s.name}</span>${auditedBadge}
            <div class="hint">${doneTasks}/${totalTasks} tasks done</div>
          </div>
          <span class="scope-hill-label ${s.status === 'done' ? 'done' : Number(s.hill_position) >= 50 ? 'downhill' : 'uphill'}">${s.hill_position || 0}%</span>
        </div>`;
      });
      html += '</div>';
    }
  }
  html += '</div>';

  if (futureBets.length) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">Betting Table (Next Cycle Candidates)</div>';
    futureBets.forEach(b => {
      html += `<div class="scope-row">
        <div style="flex:1"><strong>${b.name}</strong><div class="hint">Will be shaped when picked up</div></div>
        <div class="hint">${b.appetite || '—'}</div>
      </div>`;
    });
    html += '<div class="hint" style="margin-top:8px">Add pitch links to each candidate bet once shaping starts.</div></div>';
  }

  const blockedNeedingDiscussion = visibleTasks.filter(t => {
    if (t.status !== 'blocked') return false;
    const blob = `${t.name || ''} ${t.description || ''} ${t.notes || ''}`.toLowerCase();
    return blob.includes('needs discussion') || blob.includes('#discussion') || blob.includes('co-founder');
  });
  html += '<div class="card" style="margin-bottom:16px"><div class="card-title">Decisions Needed Queue</div>';
  if (!blockedNeedingDiscussion.length) html += '<div class="hint">No blocked items flagged for discussion.</div>';
  else blockedNeedingDiscussion.forEach(t => {
    const scope = state.scopes.find(s => s.id === t.scope_id);
    html += `<div class="decision-item"><strong>${t.name}</strong><div class="hint">${scope ? scope.name : 'Unknown scope'} • owner: ${t.owner || '—'}</div></div>`;
  });
  html += '</div>';

  const completedBets = bets.filter(b => getBetStatus(b) === 'done').sort((a, b) => a.id - b.id);
  if (completedBets.length) {
    html += '<div class="card" style="margin-bottom:16px"><div class="card-title">Cool-Down Windows</div>';
    completedBets.forEach(doneBet => {
      const nextBet = bets.find(b => b.id > doneBet.id);
      if (!nextBet) return;
      const cooldownWeeks = doneBet.cooldown_weeks || 2;
      html += `<div class="scope-row"><div style="flex:1">After Bet ${doneBet.id} before Bet ${nextBet.id}</div><div>${cooldownWeeks}-week cool-down: cleanup, bugs, exploration</div></div>`;
    });
    html += '</div>';
  }

  html += '<div class="card"><div class="card-title">Plugin Matrix (Merged from old Plugins tab)</div>';
  html += '<div style="overflow-x:auto"><table class="matrix-table"><thead><tr><th>Plugin</th>';
  state.phases.forEach(p => { html += `<th>P${p.id}</th>`; });
  html += '</tr></thead><tbody>';
  PLUGINS_STATIC.forEach(plugin => {
    html += `<tr><td>${plugin.name}</td>`;
    state.phases.forEach(p => {
      const has = plugin.phases.includes(p.id);
      html += has ? `<td><div class="matrix-cell ${plugin.isTracker?'track':'doc'}">${plugin.isTracker?'T':'D'}</div></td>` : '<td><div class="matrix-cell empty"></div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  html += '<div class="card" style="margin-top:16px"><div class="card-title">Existing Capability by Phase</div>';
  state.phases.forEach(p => {
    const color = p.coverage >= 70 ? 'var(--green)' : p.coverage >= 30 ? 'var(--yellow)' : 'var(--red)';
    html += `<div class="phase-row" onclick="expandedPhase=expandedPhase===${p.id}?null:${p.id};render()">
      <div class="phase-label">P${p.id}</div>
      <div class="phase-bar-bg">
        <div class="phase-bar-fill" style="width:${p.coverage}%;background:${color}"></div>
        <span class="phase-bar-text">${p.name}</span>
        <span class="phase-bar-pct">${p.coverage}%</span>
      </div>
    </div>`;
    if (expandedPhase === p.id) {
      html += '<div class="phase-detail">';
      if (p.plugins && p.plugins.length) html += `<div><span class="has">Has:</span> ${p.plugins.join(', ')}</div>`;
      if (p.missing && p.missing.length) html += `<div style="margin-top:4px"><span class="needs">Needs:</span> ${p.missing.join(', ')}</div>`;
      if (p.bet_id) html += `<div class="bet-ref">Addressed in Bet ${p.bet_id}</div>`;
      html += '</div>';
    }
  });
  html += `<div class="hint" style="margin-top:8px"><span class="tooltip" title="Percentage of this phase that existing Arktis plugins could theoretically handle. Does NOT indicate product readiness.">Plugin Coverage</span> reflects theoretical capability, not product readiness.</div></div>`;

  html += '<div class="card" style="margin-top:16px"><div class="card-title">Milestones (Derived from Bet Dependencies)</div>';
  state.milestones.forEach((m, i) => {
    const mStatus = deriveMilestoneStatus(m);
    html += `<div class="milestone">
      <div class="milestone-dot-col">
        <div class="milestone-dot ${mStatus}">${m.id}</div>
        ${i < state.milestones.length - 1 ? '<div class="milestone-line"></div>' : ''}
      </div>
      <div class="milestone-content">
        <div style="display:flex;align-items:center;gap:8px"><div class="milestone-name">${m.name}</div><span class="badge ${mStatus}">${STATUS_LABELS[mStatus] || mStatus}</span></div>
        <div class="milestone-criteria">${m.criteria||''}</div>
        ${m.revenue ? `<div class="milestone-revenue">${m.revenue}</div>` : ''}
        ${m.bet_ids && m.bet_ids.length ? `<div class="milestone-bets">${m.bet_ids.map(b=>`<span class="milestone-bet-tag">Bet ${b}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="grid-5" style="margin-top:20px">';
  state.bets.forEach(bet => {
    const betScopes = state.scopes.filter(s => s.bet_id === bet.id).map(markScopeAuditState);
    const status = getBetStatus(bet);
    html += `<div class="bet-card" onclick="setView('dev');selectedBet=${bet.id};render()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="bet-num">#${bet.id}</span>
        <span class="badge ${status}">${STATUS_LABELS[status]||status}</span>
      </div>
      <div class="bet-name">${bet.name}</div>
      <div class="bet-appetite">${bet.appetite}</div>
      ${bet.tim_needed ? '<div class="tim-flag">Needs Tim\'s input</div>' : ''}
      <div class="hill-container">${hillSVG(betScopes, true)}</div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderActivity(el) {
  const syntheticMissionEvents = state.missions.map(m => ({
    created_at: m.updated_at || m.created_at,
    actor: m.owner || 'System',
    action: 'mission event',
    target_type: 'mission',
    target_id: String(m.id),
    details: { mission: m.client_name, status: m.status },
  }));
  const unified = [...state.activity, ...syntheticMissionEvents]
    .filter(activityVisibleForActor)
    .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
    .slice(0, 80);

  let html = '<div class="card"><div class="card-title">Unified Activity Log (Missions + Development)</div>';
  if (!unified.length) {
    html += '<div class="hint">No activity visible for this actor.</div>';
  } else {
    unified.forEach(a => {
      const time = new Date(a.created_at).toLocaleString('en-CH', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      html += `<div class="activity-item">
        <span class="activity-time">${time}</span>
        <span class="activity-actor">${a.actor}</span>
        <span class="activity-text">${a.action} on ${a.target_type} #${a.target_id}${a.details?.mission ? ` • ${a.details.mission}` : ''}</span>
      </div>`;
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

function renderMetrics(el) {
  const visibleTasks = getVisibleTasks();
  const scopeCycleTimes = state.scopes
    .filter(s => s.status === 'done')
    .map(scope => {
      const scopedTasks = visibleTasks.filter(t => t.scope_id === scope.id);
      const touchedAt = scopedTasks
        .map(t => t.updated_at || t.created_at)
        .filter(Boolean)
        .map(ts => new Date(ts).getTime())
        .sort((a, b) => a - b)[0];

      const doneEvent = state.activity.find(a =>
        a.target_type === 'scope' &&
        String(a.target_id) === String(scope.id) &&
        String(a.action || '').includes('done')
      );
      const doneAt = doneEvent?.created_at ? new Date(doneEvent.created_at).getTime() : null;
      if (!touchedAt || !doneAt) return null;
      const days = Math.max(0, Math.round((doneAt - touchedAt) / 86400000));
      return { scope, days };
    })
    .filter(Boolean);

  const avgCycleDays = scopeCycleTimes.length
    ? Math.round(scopeCycleTimes.reduce((sum, x) => sum + x.days, 0) / scopeCycleTimes.length)
    : null;

  const burndownByBet = state.bets.map(b => {
    const scopeIds = state.scopes.filter(s => s.bet_id === b.id).map(s => s.id);
    const betTasks = visibleTasks.filter(t => scopeIds.includes(t.scope_id));
    const done = betTasks.filter(t => t.status === 'done').length;
    const remaining = betTasks.length - done;
    return { bet: b, done, remaining, total: betTasks.length };
  });

  const hillByBet = state.bets.map(b => {
    const snapshots = state.hillSnapshots.filter(s => {
      if (s.bet_id) return Number(s.bet_id) === Number(b.id);
      if (!s.scope_id) return false;
      const scope = state.scopes.find(sc => Number(sc.id) === Number(s.scope_id));
      return scope && Number(scope.bet_id) === Number(b.id);
    });
    if (snapshots.length < 2) return { bet: b, trend: null };
    const sorted = [...snapshots].sort((a, b2) => new Date(a.created_at) - new Date(b2.created_at));
    const first = Number(sorted[0].hill_position ?? sorted[0].position ?? 0);
    const last = Number(sorted[sorted.length - 1].hill_position ?? sorted[sorted.length - 1].position ?? 0);
    return { bet: b, trend: last - first };
  });

  let html = '<div class="metric-grid">';
  html += `<div class="card"><div class="card-title">Scope Cycle Time</div><div style="font-size:28px;font-weight:800;color:var(--blue)">${avgCycleDays ?? '—'}${avgCycleDays !== null ? 'd' : ''}</div><div class="hint">Days from first task touch to scope done.</div></div>`;
  html += `<div class="card"><div class="card-title">Velocity</div><div style="font-size:28px;font-weight:800;color:var(--green)">${visibleTasks.filter(t=>t.status==='done').length}</div><div class="hint">Done tasks in current visible dataset.</div></div>`;
  html += `<div class="card"><div class="card-title">Mission Revenue</div><div style="font-size:28px;font-weight:800;color:var(--yellow)">€${Math.round(state.missions.reduce((s,m)=>s+Number(m.revenue_actual||0),0)).toLocaleString('en-CH')}</div><div class="hint">Total actual revenue logged in missions.</div></div>`;
  html += '</div>';

  html += '<div class="card" style="margin-top:16px"><div class="card-title">Burndown by Bet vs Appetite</div>';
  burndownByBet.forEach(row => {
    const pct = row.total ? Math.round((row.done / row.total) * 100) : 0;
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px"><span>Bet ${row.bet.id}: ${row.bet.name} (${row.bet.appetite || 'n/a'})</span><span>${row.done} done / ${row.remaining} remaining</span></div>
      <div style="background:var(--bg);height:8px;border-radius:999px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--green)"></div></div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="card" style="margin-top:16px"><div class="card-title">Hill Position Trend</div>';
  const withTrend = hillByBet.filter(r => r.trend !== null);
  if (!withTrend.length) html += '<div class="hint">Not enough hill snapshot history yet.</div>';
  else withTrend.forEach(r => {
    const color = r.trend >= 0 ? 'var(--green)' : 'var(--red)';
    const sign = r.trend >= 0 ? '+' : '';
    html += `<div class="scope-row"><div style="flex:1">Bet ${r.bet.id}: ${r.bet.name}</div><div style="color:${color};font-weight:700">${sign}${r.trend.toFixed(1)} pts</div></div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function renderHelpModal() {
  const existing = document.getElementById('help-modal');
  if (!helpOpen) {
    if (existing) existing.remove();
    return;
  }
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'help-modal';
  modal.className = 'modal-backdrop';
  modal.onclick = function (event) {
    if (event.target === modal) toggleHelp();
  };
  modal.innerHTML = `<div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:18px">Dashboard Help</h3>
      <button class="tab" onclick="toggleHelp()">Close</button>
    </div>
    <div class="hint" style="line-height:1.7">
      <p>This dashboard uses four tabs: Active Missions, Development, Activity, and Metrics.</p>
      <p><strong>Plugin Coverage</strong> indicates theoretical capability only (not production readiness).</p>
      <p>When acting as Tim, the dashboard filters to Tim + Both ownership and defaults to Development with a My Tasks table.</p>
      <p>Use tab URLs like <code>?tab=missions</code>, <code>?tab=dev</code>, <code>?tab=activity</code>, <code>?tab=metrics</code> for deep links.</p>
      <p>Writes are currently disabled in this UI due to read-only anon access; use Cowork sessions for updates.</p>
    </div>
  </div>`;
  document.body.appendChild(modal);
}

hydrateFromCache();
render();
loadAll();
setInterval(loadAll, 45000);
</script>
</div><!-- /app-wrapper -->
